[settings]
experimental = true

[tools]
# Pinned major.minor, resolved at scaffold time.
go            = "1.26"
golangci-lint = "2.12"
goreleaser    = "2.16"
# Docs are built with mkdocs; pin the Python that backs it.
python        = "3.13"

[env]
_.file = ".env.yaml"
_.python.venv = { path = ".venv", create = true }
