; PlatformIO project: two board environments.
;   esp01s -> ESP-01S (ESP8266)
;   esp32  -> ESP32 dev board
; Select one with `-e <env>` (the mise pio:* tasks take the env as an arg).

[platformio]
default_envs = esp01s

[env]
framework = arduino
monitor_speed = 115200
build_flags = -I include/generated   ; generated asset headers live here

[env:esp01s]
platform = espressif8266
board = esp01_1m
upload_speed = 115200

[env:esp32]
platform = espressif32
board = esp32dev
upload_speed = 921600
