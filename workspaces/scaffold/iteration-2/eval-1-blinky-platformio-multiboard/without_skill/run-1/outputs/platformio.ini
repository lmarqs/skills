; PlatformIO Project Configuration File
;
; Two build environments are defined:
;   - esp01s : ESP-01S module (ESP8266)
;   - esp32  : generic ESP32 dev board
;
; Build/flash/monitor are driven through mise tasks (see mise.toml), but you can
; also use PlatformIO directly, e.g.:
;   pio run -e esp32
;   pio run -e esp01s -t upload
;   pio device monitor -e esp32
;
; Docs: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32
src_dir = src
include_dir = include

; ---------------------------------------------------------------------------
; Settings shared by every environment.
; ---------------------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
; Regenerate asset headers before each build.
extra_scripts =
    pre:scripts/generate_headers.py
; Allow the generated headers directory to be found.
build_flags =
    -I include/generated

; ---------------------------------------------------------------------------
; ESP-01S (ESP8266, 1 MB flash). The onboard LED is on GPIO2 and is active-low.
; ---------------------------------------------------------------------------
[env:esp01s]
platform = espressif8266
board = esp01_1m
build_flags =
    ${env.build_flags}
    -D LED_BUILTIN=2
    -D LED_ACTIVE_LOW=1
    -D BOARD_ESP01S=1

; ---------------------------------------------------------------------------
; ESP32 dev board. The onboard LED is on GPIO2 and is active-high.
; ---------------------------------------------------------------------------
[env:esp32]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -D LED_BUILTIN=2
    -D LED_ACTIVE_LOW=0
    -D BOARD_ESP32=1
