[settings]
experimental = true
# Read node/python versions from .node-version/.python-version:
idiomatic_version_file_enable_tools = ["node", "python"]

[tools]
# Pinned major.minor, resolved at scaffold time.
node       = "24"
pnpm       = "10.16"   # matches packageManager in package.json
python     = "3.13"    # pyproject requires-python >=3.13
aws-cli    = "2"

[env]
_.file = ".env.yaml"
_.python.venv = { path = "packages/api/.venv", create = true }
