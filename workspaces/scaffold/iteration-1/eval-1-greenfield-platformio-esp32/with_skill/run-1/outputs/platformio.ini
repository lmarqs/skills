; PlatformIO project configuration for an ESP32 firmware target.
; Docs: https://docs.platformio.org/page/projectconf.html
;
; The default environment below targets a generic ESP32 dev board. Adjust `board`
; to match your hardware (run `pio boards espressif32` to list options).

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor / upload speed. Override the upload port via the env file
; (PIO_UPLOAD_PORT) so it never has to be hard-coded here.
monitor_speed = 115200
upload_speed = 921600
